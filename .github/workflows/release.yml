name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: raven-tui

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
            features: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
            features: ""
          - target: x86_64-apple-darwin
            os: macos-13
            use_cross: false
            features: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false
            features: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux cross-compilation)
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release binary
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            CARGO=cross
          else
            CARGO=cargo
          fi

          FEATURE_FLAGS=""
          if [ -n "${{ matrix.features }}" ]; then
            FEATURE_FLAGS="--features ${{ matrix.features }}"
          else
            # Disable clipboard on Linux (requires X11/Wayland libs at runtime)
            # Enable on macOS where it works natively
            if [[ "${{ matrix.target }}" == *linux* ]]; then
              FEATURE_FLAGS="--no-default-features"
            fi
          fi

          $CARGO build --release --target ${{ matrix.target }} $FEATURE_FLAGS

      - name: Strip binary
        run: |
          BIN="target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}"
          if [[ "${{ matrix.target }}" == *linux* ]] && [ "${{ matrix.use_cross }}" = "true" ]; then
            # cross-compiled: use the appropriate strip
            if [[ "${{ matrix.target }}" == aarch64* ]]; then
              docker run --rm -v "$(pwd):/workspace" -w /workspace \
                ghcr.io/cross-rs/${{ matrix.target }}:main \
                aarch64-linux-gnu-strip "$BIN" || true
            else
              strip "$BIN" || true
            fi
          else
            strip "$BIN" || true
          fi

      - name: Package
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          ARCHIVE="${{ env.BINARY_NAME }}-${TAG}-${{ matrix.target }}"
          mkdir -p "$ARCHIVE"
          cp "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}" "$ARCHIVE/"
          cp README.md "$ARCHIVE/" 2>/dev/null || true
          cp LICENSE* "$ARCHIVE/" 2>/dev/null || true

          if [[ "${{ matrix.target }}" == *linux* ]]; then
            tar czf "${ARCHIVE}.tar.gz" "$ARCHIVE"
            echo "ASSET=${ARCHIVE}.tar.gz" >> "$GITHUB_ENV"
          else
            tar czf "${ARCHIVE}.tar.gz" "$ARCHIVE"
            echo "ASSET=${ARCHIVE}.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ASSET }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
