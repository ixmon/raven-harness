name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: raven-tui
  # Pin so Linux builds stay on glibc 2.31 (Debian bullseye / Ubuntu 20.04).
  # Host `ubuntu-latest` + default `cross` images track newer glibc (2.39+) and break 20.04.
  LINUX_BUILD_IMAGE: rust:1-bullseye

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            kind: linux
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            kind: linux
          - target: x86_64-apple-darwin
            os: macos-latest
            kind: unix-native
          - target: aarch64-apple-darwin
            os: macos-latest
            kind: unix-native
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            kind: windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (macOS / Windows)
        if: matrix.kind != 'linux'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Linux: compile inside Debian bullseye (glibc 2.31) so curl-install works on
      # Ubuntu 20.04+ / RHEL 8-class systems. Do not use host ubuntu-latest glibc.
      - name: Build release binary (Linux, glibc 2.31)
        if: matrix.kind == 'linux'
        run: |
          set -euo pipefail
          docker pull "${{ env.LINUX_BUILD_IMAGE }}"
          # Official rust images put cargo/rustup under /usr/local/cargo/bin but do not
          # put that directory on PATH for non-login shells (bash -lc still needs export).
          docker run --rm \
            -v "$PWD":/work \
            -w /work \
            -e CARGO_TERM_COLOR=always \
            "${{ env.LINUX_BUILD_IMAGE }}" \
            bash -lc '
              set -euo pipefail
              export PATH="/usr/local/cargo/bin:${PATH:-/usr/bin:/bin}"
              command -v cargo
              command -v rustc
              rustc -V
              TARGET="${{ matrix.target }}"
              if [ "$TARGET" = "x86_64-unknown-linux-gnu" ]; then
                cargo build --release --no-default-features
                mkdir -p "target/${TARGET}/release"
                cp -f target/release/raven-tui "target/${TARGET}/release/raven-tui"
              else
                # aarch64 cross-link still uses bullseye-era glibc from the distro toolchain
                apt-get update
                DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
                  gcc-aarch64-linux-gnu libc6-dev-arm64-cross
                rustup target add aarch64-unknown-linux-gnu
                export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
                cargo build --release --target aarch64-unknown-linux-gnu --no-default-features
              fi
            '
          # Report max GLIBC version required (must be <= 2.31 for Ubuntu 20.04)
          BIN="target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}"
          echo "Built: $BIN"
          test -x "$BIN"
          if command -v objdump >/dev/null; then
            echo "GLIBC symbols (highest should be <= 2.31):"
            objdump -T "$BIN" | grep -oE 'GLIBC_[0-9.]+' | sort -uV | tail -5
            MAX=$(objdump -T "$BIN" | grep -oE 'GLIBC_[0-9.]+' | sort -uV | tail -1)
            echo "Max GLIBC symbol: $MAX"
            case "$MAX" in
              GLIBC_2.3[2-9]*|GLIBC_2.[4-9]*|GLIBC_[3-9]*)
                echo "::error::Binary requires $MAX (> 2.31); Ubuntu 20.04 will fail"
                exit 1
                ;;
            esac
          fi

      - name: Build release binary (macOS)
        if: matrix.kind == 'unix-native'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build release binary (Windows)
        if: matrix.kind == 'windows'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (Unix)
        if: matrix.kind == 'linux' || matrix.kind == 'unix-native'
        run: |
          BIN="target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}"
          if [[ "${{ matrix.target }}" == aarch64*linux* ]]; then
            docker run --rm -v "$(pwd):/work" -w /work "${{ env.LINUX_BUILD_IMAGE }}" \
              bash -lc 'export PATH="/usr/local/cargo/bin:${PATH:-/usr/bin:/bin}"
                apt-get update -qq && apt-get install -y -qq binutils-aarch64-linux-gnu >/dev/null \
                && aarch64-linux-gnu-strip "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}"' || true
          else
            strip "$BIN" || true
          fi

      - name: Package (Unix)
        if: matrix.kind == 'linux' || matrix.kind == 'unix-native'
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          ARCHIVE="${{ env.BINARY_NAME }}-${TAG}-${{ matrix.target }}"
          mkdir -p "$ARCHIVE"
          cp "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}" "$ARCHIVE/"
          cp README.md "$ARCHIVE/" 2>/dev/null || true
          cp LICENSE* "$ARCHIVE/" 2>/dev/null || true
          tar czf "${ARCHIVE}.tar.gz" "$ARCHIVE"
          echo "ASSET=${ARCHIVE}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: matrix.kind == 'windows'
        shell: pwsh
        run: |
          $Tag = "${{ github.ref_name }}"
          $Archive = "${{ env.BINARY_NAME }}-${Tag}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path $Archive | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe" "$Archive/"
          Copy-Item "README.md" "$Archive/" -ErrorAction SilentlyContinue
          Copy-Item "LICENSE*" "$Archive/" -ErrorAction SilentlyContinue
          Compress-Archive -Path "$Archive" -DestinationPath "${Archive}.zip"
          echo "ASSET=${Archive}.zip" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ASSET }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      # Duplicate assets without the version tag so README links can use
      # /releases/latest/download/<stable-name> and never need updating.
      - name: Add stable download aliases
        run: |
          mkdir -p release-assets
          find artifacts -type f -exec cp {} release-assets/ \;
          for f in release-assets/raven-tui-v*; do
            [ -f "$f" ] || continue
            stable=$(basename "$f" | sed -E 's/raven-tui-v[^-]+-/raven-tui-/')
            cp "$f" "release-assets/${stable}"
          done
          find release-assets -type f | sort

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
