name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: raven-tui

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            use_cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use_cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux cross-compilation)
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release binary (Unix)
        if: runner.os != 'Windows'
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            CARGO=cross
          else
            CARGO=cargo
          fi

          # Disable clipboard on Linux (requires X11/Wayland libs at runtime)
          if [[ "${{ matrix.target }}" == *linux* ]]; then
            FEATURE_FLAGS="--no-default-features"
          else
            FEATURE_FLAGS=""
          fi

          $CARGO build --release --target ${{ matrix.target }} $FEATURE_FLAGS

      - name: Build release binary (Windows)
        if: runner.os == 'Windows'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        run: |
          BIN="target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}"
          if [[ "${{ matrix.target }}" == aarch64*linux* ]] && [ "${{ matrix.use_cross }}" = "true" ]; then
            docker run --rm -v "$(pwd):/workspace" -w /workspace \
              ghcr.io/cross-rs/${{ matrix.target }}:main \
              aarch64-linux-gnu-strip "$BIN" || true
          else
            strip "$BIN" || true
          fi

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          ARCHIVE="${{ env.BINARY_NAME }}-${TAG}-${{ matrix.target }}"
          mkdir -p "$ARCHIVE"
          cp "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}" "$ARCHIVE/"
          cp README.md "$ARCHIVE/" 2>/dev/null || true
          cp LICENSE* "$ARCHIVE/" 2>/dev/null || true
          tar czf "${ARCHIVE}.tar.gz" "$ARCHIVE"
          echo "ASSET=${ARCHIVE}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $Tag = "${{ github.ref_name }}"
          $Archive = "${{ env.BINARY_NAME }}-${Tag}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path $Archive | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe" "$Archive/"
          Copy-Item "README.md" "$Archive/" -ErrorAction SilentlyContinue
          Copy-Item "LICENSE*" "$Archive/" -ErrorAction SilentlyContinue
          Compress-Archive -Path "$Archive" -DestinationPath "${Archive}.zip"
          echo "ASSET=${Archive}.zip" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ASSET }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
